name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate animated contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: diegoperezceada
          outputs: |
            dist/github-snake.svg?color_snake=%2322c55e&color_dots=%23ebedf0,%239be9a8,%2340c463,%2330a14e,%23216939
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%23f97316&color_dots=%23161b22,%230e4429,%2300651d,%2326a641,%2339d353
            dist/github-snake.gif?color_snake=%23f59e0b&color_dots=%23dbeafe,%2393c5fd,%2360a5fa,%232563eb,%231e3a8a&color_background=%230f172a

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
